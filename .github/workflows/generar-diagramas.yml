name: Generador de Diagramas UML

# El robot se activará cada vez que hagas un push a la rama 'main'
on:
  push:
    branches: [ "master" ]

jobs:
  render-uml:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código de tu repositorio en la máquina virtual
    - name: Descargar repositorio
      uses: actions/checkout@v4

    # 2. Usa una Action prefabricada de la comunidad que transforma .puml en imágenes (.png)
    - name: Renderizar archivos PlantUML
      uses: xcruiser/plantuml-action@v1
      with:
        # Busca todos los archivos .puml dentro de la carpeta 'diagramas'
        path: "src/main/resources/uml"
        output_format: "png"

    # 3. El robot guarda las imágenes generadas de vuelta en tu repositorio
    - name: Subir imágenes generadas al repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add src/main/resources/uml/*.png
        # Solo hace commit si realmente cambiaron los diagramas para evitar errores
        git diff-index --quiet HEAD || git commit -m "Bot: Actualización automática de diagramas UML [skip ci]"
        git push
