name: Generador de Diagramas UML

# El robot se activará cada vez que hagas un push a la rama 'main'
on:
  push:
    branches: [ "master" ]

jobs:
  render-uml:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código de tu repositorio en la máquina virtual
    - name: Descargar repositorio
      uses: actions/checkout@v4

    # 2. Instala Java y Graphviz (Herramientas necesarias para que funcione PlantUML)
    - name: Instalar dependencias del sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz default-jre

    # 3. Descarga la herramienta oficial de PlantUML directamente de sus servidores
    - name: Descargar PlantUML
      run: |
        curl -L -o plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2024.7/plantuml-1.2024.7.jar

    # 4. Ejecuta el comando para renderizar todos los archivos .puml de tu carpeta
    - name: Generar imágenes de los diagramas
      run: |
        java -jar plantuml.jar -tpng src/main/resources/uml/*.puml

    # 5. Guarda y sube las imágenes generadas a tu repositorio
    - name: Subir imágenes generadas al repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add src/main/resources/uml/*.png
        # Solo hace commit si realmente cambiaron los diagramas para evitar errores
        git diff-index --quiet HEAD || git commit -m "Bot: Actualización automática de diagramas UML [skip ci]"
        git push
